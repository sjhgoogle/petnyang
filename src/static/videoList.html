<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video List</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.8/axios.js"></script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <nav class="p-4 bg-white shadow mb-6 flex gap-4">
      <a href="/index.html" class="btn btn-link">Home</a>
      <a href="/video-list.html" class="btn btn-link">Video List</a>
    </nav>
    <main class="max-w-3xl mx-auto p-4 bg-white rounded-xl shadow">
      <h1 class="text-2xl font-bold mb-6">🎬 Saved Videos</h1>
      <div id="video-list" class="space-y-8"></div>
    </main>
    <script>
      axios
        .get("/videos")
        .then((res) => {
          const list = res.data;
          const container = document.getElementById("video-list");
          if (!list.length) {
            container.innerHTML =
              '<p class="text-gray-500">No videos found.</p>';
            return;
          }
          list.forEach((item) => {
            const div = document.createElement("div");
            div.className =
              "video-item flex flex-col md:flex-row gap-6 border-b pb-8";
            div.innerHTML = `
            <div class="flex-shrink-0">
              <video class="w-64 h-40 rounded-lg shadow" controls src="/video/${
                item.fileNm
              }"></video>
            </div>
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-2">
                <span class="font-semibold text-lg">${item.fileNm}</span>
                <span class="badge badge-outline badge-sm">Scenes:${
                  item.sceneArr.length
                }</span>
                <span class="ml-2 text-xs text-blue-600" id="progress-${
                  item.fileNm
                }">진행률: --%</span>
                <button class="btn btn-xs btn-error ml-auto" onclick="deleteVideo('${
                  item.fileNm
                }', this)">Delete</button>
              </div>
              <div class="text-sm text-gray-500 mb-2">
                <span class="font-semibold">Background:</span> ${
                  item.backImgPath
                }
              </div>
              <details class="collapse collapse-arrow bg-base-200">
                <summary class="collapse-title font-medium">Show Scenes</summary>
                <div class="collapse-content">
                  <ol class="space-y-3">
                    ${item.sceneArr
                      .map(
                        (scene, idx) => `
                      <li class="p-2 rounded bg-base-100 shadow-sm">
                        <div class="font-semibold text-purple-700">${
                          idx + 1
                        }. ${scene.title}</div>
                        <div class="text-gray-700">${scene.desc || ""}</div>
                        <div class="text-xs text-gray-400 mb-1">Time: ${
                          scene.timeSlice.start
                        } ~ ${scene.timeSlice.end}s</div>
                        <ul class="list-disc ml-5 text-sm text-gray-600">
                          ${(scene.mentArr || [])
                            .map((ment) => `<li>${ment}</li>`)
                            .join("")}
                        </ul>
                        <div class="text-xs text-gray-400 mt-1">Pos: x=${
                          scene.initPos.xPos
                        }, y=${scene.initPos.yPos}</div>
                      </li>
                    `
                      )
                      .join("")}
                  </ol>
                </div>
              </details>
            </div>
          `;
            container.appendChild(div);
            // 진행률 SSE 연결
            listenProgress(item.fileNm);
          });
        })
        .catch(() => {
          document.getElementById("video-list").innerHTML =
            '<p class="text-red-500">Failed to load videos.</p>';
        });

      function listenProgress(fileNm) {
        const progressEl = document.getElementById("progress-" + fileNm);
        if (!progressEl) return;
        const evtSource = new EventSource(`/progress/${fileNm}`);
        evtSource.onmessage = function (event) {
          const { percent } = JSON.parse(event.data);
          progressEl.textContent = `진행률: ${percent}%`;
          if (percent >= 100 || percent === -1) {
            evtSource.close();
          }
        };
        evtSource.onerror = function () {
          evtSource.close();
        };
      }

      function deleteVideo(fileNm, btn) {
        if (!confirm("Are you sure you want to delete this video?")) return;
        btn.disabled = true;
        axios
          .delete("/video/" + encodeURIComponent(fileNm))
          .then(() => {
            btn.closest(".video-item").remove();
          })
          .catch(() => {
            alert("Failed to delete video.");
            btn.disabled = false;
          });
      }
    </script>
  </body>
</html>
